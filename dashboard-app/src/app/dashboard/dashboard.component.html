

<div class="container">

    <div class="d-flex justify-content-between mb-3">
        <div>
            <a routerLink="/clientes" class="btn btn-outline-primary me-2">Ir a Clientes</a>
            <a routerLink="/pedidos" class="btn btn-outline-success">Ir a Pedidos</a>
        </div>
        <button class="btn btn-outline-danger" (click)="logout()">Cerrar sesión</button>
    </div>

    <!-- Filtros -->
    <form class="row mb-4" (ngSubmit)="filtrar()">
        <div class="col-auto">
            <label for="fechaDesde" class="form-label">Desde:</label>
            <input type="date" id="fechaDesde" [(ngModel)]="fechaDesde" name="fechaDesde" class="form-control" />
        </div>
        <div class="col-auto">
            <label for="fechaHasta" class="form-label">Hasta:</label>
            <input type="date" id="fechaHasta" [(ngModel)]="fechaHasta" name="fechaHasta" class="form-control" />
        </div>
        <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-primary">Filtrar</button>
        </div>
    </form>

    <h2>Dashboard</h2>

    <!-- Cards -->
    <div class="row">
        <div class="col">
            <h3>Total Pedidos</h3>
            <p>{{ totalPedidos }}</p>
        </div>

        <div class="col">
            <h3>Clientes Activos</h3>
            <p>{{ clientesActivos }}</p>
        </div>
    </div>

    <!-- Gráficas -->
    <div class="row">
        <div class="col">
            <canvas #estadoChartCanvas></canvas>
        </div>

        <div class="col">
            <canvas #diaChartCanvas></canvas>
        </div>
    </div>

</div>
