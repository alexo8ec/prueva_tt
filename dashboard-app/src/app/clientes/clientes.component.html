<div class="clientes-container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Clientes</h2>
    <a routerLink="/" class="btn btn-outline-secondary">Volver al inicio</a>
  </div>

  <button class="btn btn-primary mb-3" (click)="abrirModalAgregar()">Agregar Cliente</button>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cliente of clientes">
        <td>{{ cliente.nombre }}</td>
        <td>{{ cliente.apellido }}</td>
        <td>{{ cliente.email }}</td>
        <td>{{ cliente.telefono }}</td>
        <td>
          <button class="btn btn-sm btn-warning me-2" (click)="abrirModalEditar(cliente)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="eliminarCliente(cliente)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal-backdrop-custom" *ngIf="modalAbierto">
    <div class="modal-custom">
      <h3>{{ editando ? 'Editar Cliente' : 'Agregar Cliente' }}</h3>

      <form (ngSubmit)="guardarCliente()">
        <input [(ngModel)]="nuevoCliente.nombre" name="nombre" placeholder="Nombre" class="form-control mb-2">
        <input [(ngModel)]="nuevoCliente.apellido" name="apellido" placeholder="Apellido" class="form-control mb-2">
        <input [(ngModel)]="nuevoCliente.email" name="email" placeholder="Email" class="form-control mb-2">
        <input [(ngModel)]="nuevoCliente.telefono" name="telefono" placeholder="Teléfono" class="form-control mb-3">

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
