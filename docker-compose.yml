services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=LaMeg@Password123!
    ports:
      - "1433:1433"
    volumes:
      - ./docker/mssql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend

  php:
    build: ./docker/php
    container_name: laravel
    volumes:
      - ./crm-service:/var/www/html
    environment:
      - DB_CONNECTION=sqlsrv
      - DB_HOST=mssql
      - DB_PORT=1433
      - DB_DATABASE=CrmDB
      - DB_USERNAME=sa
      - DB_PASSWORD=LaMeg@Password123!
    depends_on:
      - mssql
    networks:
      - backend

  dotnet:
    build:
      context: .
      dockerfile: docker/dotnet/Dockerfile
    container_name: dotnet
      # volumes:
      #   - ./auth-service/AuthService:/app
    environment:
      - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=AuthDB;User Id=sa;Password=LaMeg@Password123!;
    depends_on:
      - mssql
    networks:
      - backend

  angular:
    build:
      context: ./dashboard-app
      dockerfile: ../docker/angular/Dockerfile
    container_name: dashboard
    volumes:
      - ./dashboard-app/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./dashboard-app/ssl:/etc/nginx/ssl
      # volumes:
      #   - ./dashboard-app:/usr/src/app
    ports:
      - "4200:4200"
    depends_on:
      - dotnet
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - php
      - dotnet
      - angular
    networks:
      - backend

networks:
  backend:
    driver: bridge
