version: '3.9'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=LaMeg@Password123!
      - CSHARP_JWT_SECRET=PMv1EXDfHmeZxvRrxtDDxJITaXsP8PlAdtRV2wRbrhOY9tPuqWI0cKHJuFA06SiR
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    expose:
      - "1433"
    networks:
      - backend

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel-php
    working_dir: /var/www/html
    volumes:
      - ./crm-service:/var/www/html
    depends_on:
      - mssql
    expose:
      - "9000"
    networks:
      - backend

  angular:
    build:
      context: ./dashboard-app
      dockerfile: ../docker/angular/Dockerfile
    container_name: angular-app
    expose:
      - "80"
    networks:
      - backend

  dotnet:
    build:
      context: .
      dockerfile: docker/dotnet/Dockerfile
    container_name: dotnet-api
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=AuthDB;User Id=sa;Password=LaMeg@Password123!;TrustServerCertificate=True;
    expose:
      - "80"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx-test
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - angular
      - dotnet
      - php
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./crm-service:/var/www/html
    networks:
      - backend

volumes:
  sql_data:

networks:
  backend:
    driver: bridge